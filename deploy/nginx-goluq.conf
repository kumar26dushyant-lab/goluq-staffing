# GoLuQ nginx vhost — same pattern as your Sarathi/Nidaan server-blocks.
# Put at /etc/nginx/sites-available/goluq.com and symlink into sites-enabled.
# Then: sudo nginx -t && sudo systemctl reload nginx
# TLS:  sudo certbot --nginx -d goluq.com -d www.goluq.com

server {
    listen 80;
    listen [::]:80;
    server_name goluq.com www.goluq.com;

    # Proxy everything to the GoLuQ container (host networking, 127.0.0.1:8090)
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 2m;
}
