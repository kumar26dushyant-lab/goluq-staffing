name = "goluq-staffing"
main = "worker.ts"
compatibility_date = "2024-11-01"

# Serve the Vite build (dist) as static assets, with SPA fallback for client routes.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ── D1 (leads + affiliate) ────────────────────────────────────────────────
# Create the DB first, then UNCOMMENT and paste the database_id:
#   npx wrangler d1 create goluq-leads
#   npx wrangler d1 execute goluq-leads --file=./schema.sql --remote
# Until this is set, the site deploys fine; only the lead/admin APIs are inactive
# (the booking form falls back to WhatsApp).
# [[d1_databases]]
# binding = "DB"
# database_name = "goluq-leads"
# database_id = "<paste-from-wrangler-d1-create>"

# Secrets/vars (ADMIN_SECRET, EVOLUTION_*, GOLUQ_WA_INSTANCE, OWNER_WHATSAPP,
# GEMINI_API_KEY) are set in the dashboard → Settings → Variables and secrets.
